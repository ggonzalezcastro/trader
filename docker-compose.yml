version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: trading_nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trading_tsdb
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: botpass123
      POSTGRES_DB: trading
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: trading_api
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_URL: postgresql://bot:botpass123@timescaledb:5432/trading
      NATS_URL: nats://nats:4222
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"

  telegram-bot:
    build:
      context: ./services/telegram
      dockerfile: Dockerfile
    container_name: trading_telegram
    environment:
      TG_TOKEN: ${TG_TOKEN:-}
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy

volumes:
  redis_data:
  tsdb_data: